services:
  kafka:
    image: confluentinc/cp-kafka:8.2.0
    command:
      - bash
      - -c
      - |
        cat <<EOF > /tmp/kraft.properties
        process.roles=broker,controller
        node.id=1
        controller.quorum.voters=1@kafka:19093
        controller.listener.names=CONTROLLER
        listeners=PLAINTEXT://:9092,CONTROLLER://:19093
        advertised.listeners=PLAINTEXT://localhost:9092
        log.dirs=/var/lib/kafka/data
        EOF

        echo "Formatting storage with SCRAM users from host environment..."
        # Docker replaces these with your exported .profile variables
        kafka-storage format --ignore-formatted \
          --cluster-id "$${CLUSTER_ID}" \
          --config /tmp/kraft.properties \
          --add-scram "SCRAM-SHA-512=[name=${KAFKA_ADMIN},password=${KAFKA_ADMIN_PASSWORD}]" \
          --add-scram "SCRAM-SHA-512=[name=${KAFKA_USER},password=${KAFKA_PASSWORD}]"
        
        exec /etc/confluent/docker/run
    ports:
      - "9092:9092"
    networks:
      - eco-net
    secrets:
      - kafka_server_jaas
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:19093'
      KAFKA_LISTENERS: 'INTERNAL://:9093,CLIENT://:9092,CONTROLLER://:19093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:9093,CLIENT://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:SASL_PLAINTEXT,CLIENT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'

      KAFKA_OPTS: "-Djava.security.auth.login.config=/run/secrets/kafka_server_jaas"

      # SASL/PLAIN (Basic Auth) Configuration
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-512
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: SCRAM-SHA-512

      # KRaft Settings
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'

  schema-registry:
    image: confluentinc/cp-schema-registry:8.2.0
    ports:
      - "8085:8081"
    networks:
      - eco-net
    depends_on:
      - kafka
    secrets:
      - schema_registry_jaas
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka:9093'
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      # Security for Schema Registry
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: SASL_PLAINTEXT
      SCHEMA_REGISTRY_KAFKASTORE_SASL_MECHANISM: SCRAM-SHA-512
      KAFKA_OPTS: "-Djava.security.auth.login.config=/run/secrets/schema_registry_jaas"
      SCHEMA_REGISTRY_OPTS: "-Djava.security.auth.login.config=/run/secrets/schema_registry_jaas"

secrets:
  kafka_server_jaas:
    file: secrets/scram/kafka_server_jaas.conf
  schema_registry_jaas:
    file: secrets/scram/schema_registry_jaas.conf

networks:
  eco-net:
    driver: bridge
