spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:h2:file:./data/weatherdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  kafka:
    bootstrap-servers: localhost:9092
    properties:
      security.protocol: SASL_PLAINTEXT
      sasl.mechanism: SCRAM-SHA-512
      sasl.jaas.config: "org.apache.kafka.common.security.scram.ScramLoginModule required username='${KAFKA_USER}' password='${KAFKA_PASSWORD}';"
    producer:
      acks: all
      retries: 10
      custom-transaction-id-prefix: "ingestion-service-"
      properties:
        enable.idempotence: true
        schema.registry.url: http://localhost:8085
        linger.ms: 20
        batch.size: 65536
        compression.type: snappy
        request.timeout.ms: 5000
        delivery.timeout.ms: 60000
        retry.backoff.ms: 1000
        max.in.flight.requests.per.connection: 5
    consumer:
      properties:
        security.protocol: PLAINTEXT

app:
  kafka:
    topic:
      name: WeatherPacketReceived

server:
  port: 8081

logging:
  level:
    root: INFO
    com.eco.ingestion: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) %magenta(%-40.40logger{39}) : %msg%n"
